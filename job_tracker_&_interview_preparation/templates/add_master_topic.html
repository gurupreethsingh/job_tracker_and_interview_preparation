{% extends "base.html" %}
{% block title %}Add Master Topic | CareerForge{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="glass-card p-4 p-md-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div><span class="section-pill">Superadmin</span><h2 class="fw-bold mt-3 mb-1">Add Master Topic</h2></div>
        <a href="{{ url_for('all_master_topics') }}" class="btn btn-light-soft">All Topics</a>
      </div>
      <form method="POST">
        <div class="mb-3"><label class="form-label fw-semibold">Topic Name</label><input type="text" name="topic_name" class="form-control form-control-lg rounded-4" required></div>
        <div class="mb-3"><label class="form-label fw-semibold">Category</label><input type="text" name="category" class="form-control form-control-lg rounded-4" placeholder="DSA, DBMS, HR, OS, CN"></div>
        <div class="mb-4"><label class="form-label fw-semibold">Description</label><textarea name="description" rows="5" class="form-control rounded-4"></textarea></div>
        <button type="submit" class="btn btn-primary-soft">Add Master Topic</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
