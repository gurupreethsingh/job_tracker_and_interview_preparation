{% extends "base.html" %}
{% block title %}Reset Password | CareerForge{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="glass-card p-4 p-md-5">
            <div class="text-center mb-4">
                <span class="section-pill">Security update</span>
                <h2 class="fw-bold mt-3 mb-2">Create a new password</h2>
            </div>
            <form method="POST" action="{{ url_for('reset_password', token=token) }}">
                <div class="mb-3">
                    <label class="form-label fw-semibold">New Password</label>
                    <input type="password" name="password" class="form-control form-control-lg rounded-4" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Confirm New Password</label>
                    <input type="password" name="confirm_password" class="form-control form-control-lg rounded-4" required>
                </div>
                <button type="submit" class="btn btn-primary-soft w-100">Reset Password</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
