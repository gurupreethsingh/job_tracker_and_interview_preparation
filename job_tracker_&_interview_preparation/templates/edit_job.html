{% extends "base.html" %}
{% block title %}Edit Job | CareerForge{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-9">
        <div class="glass-card p-4 p-md-5">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
                <div>
                    <span class="section-pill">Superadmin</span>
                    <h2 class="fw-bold mt-3 mb-1">Edit Job</h2>
                    <p class="text-muted mb-0">Update job posting details.</p>
                </div>
                <a href="{{ url_for('all_jobs') }}" class="btn btn-light-soft">All Jobs</a>
            </div>

            <form method="POST">
                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Job Title</label>
                        <input type="text" name="title" value="{{ job.title }}"
                            class="form-control form-control-lg rounded-4" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Company</label>
                        <input type="text" name="company" value="{{ job.company }}"
                            class="form-control form-control-lg rounded-4" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Location</label>
                        <input type="text" name="location" value="{{ job.location }}"
                            class="form-control form-control-lg rounded-4">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Salary</label>
                        <input type="text" name="salary" value="{{ job.salary }}"
                            class="form-control form-control-lg rounded-4">
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-semibold">Job Description</label>
                        <textarea name="description" rows="8" class="form-control rounded-4"
                            required>{{ job.description }}</textarea>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4 flex-wrap">
                    <button type="submit" class="btn btn-primary-soft">Update Job</button>
                    <a href="{{ url_for('single_job', job_id=job.id) }}"
                        class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
