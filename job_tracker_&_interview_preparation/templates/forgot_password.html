{% extends "base.html" %}
{% block title %}Forgot Password | CareerForge{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="glass-card p-4 p-md-5">
            <div class="text-center mb-4">
                <span class="section-pill">Account recovery</span>
                <h2 class="fw-bold mt-3 mb-2">Forgot your password?</h2>
            </div>
            <form method="POST" action="{{ url_for('forgot_password') }}">
                <div class="mb-4">
                    <label class="form-label fw-semibold">Registered Email</label>
                    <input type="email" name="email" class="form-control form-control-lg rounded-4" required>
                </div>
                <button type="submit" class="btn btn-primary-soft w-100">Generate Reset Link</button>
            </form>
            {% if reset_link %}
            <div class="soft-card p-3 mt-4">
                <div class="fw-bold mb-2">Development Reset Link</div>
                <a href="{{ reset_link }}" class="text-decoration-none fw-semibold" style="color: var(--primary); word-break: break-all;">{{ reset_link }}</a>
            </div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
