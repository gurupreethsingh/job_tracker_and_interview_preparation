{% extends "base.html" %}
{% block title %}Apply Job | CareerForge{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-9">
        <div class="glass-card p-4 p-md-5">
            <div class="mb-4">
                <span class="section-pill">Apply</span>
                <h2 class="fw-bold mt-3 mb-1">Apply for Job</h2>
                <p class="text-muted mb-0">Fill in your details carefully before submitting your application.</p>
            </div>

            <form method="POST" enctype="multipart/form-data">
                <div class="row g-4">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Full Name</label>
                        <input type="text" name="full_name" class="form-control form-control-lg rounded-4"
                            value="{{ current_user_name or '' }}" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" name="email" class="form-control form-control-lg rounded-4"
                            value="{{ session.get('email', '') }}" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Phone Number</label>
                        <input type="text" name="phone" class="form-control form-control-lg rounded-4"
                            placeholder="Enter phone number" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Upload Resume</label>
                        <input type="file" name="resume" class="form-control form-control-lg rounded-4" required>
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-semibold">Cover Letter</label>
                        <textarea name="cover_letter" rows="7" class="form-control rounded-4"
                            placeholder="Write your cover letter here..." required></textarea>
                    </div>
                </div>

                <div class="d-flex gap-2 mt-4 flex-wrap">
                    <button type="submit" class="btn btn-primary-soft">Submit Application</button>
                    <a href="{{ url_for('user_jobs') }}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
