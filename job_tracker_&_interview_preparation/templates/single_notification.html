{% extends "base.html" %}
{% block title %}Notification Details | CareerForge{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="glass-card p-4 p-md-5">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-4">
                <div>
                    <span class="section-pill">Notification</span>
                    <h2 class="fw-bold mt-3 mb-1">Notification Details</h2>
                </div>
                <a href="{{ url_for('notifications') }}" class="btn btn-light-soft">Back</a>
            </div>

            <div class="border rounded-4 p-4">
                <h5 class="fw-bold mb-3">Message</h5>
                <p class="mb-3">{{ notification.message }}</p>
                <small class="text-muted">Received on: {{ notification.created_at }}</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
