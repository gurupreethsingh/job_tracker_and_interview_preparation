{% extends "base.html" %}
{% block title %}Update Role | CareerForge{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="glass-card p-4 p-md-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div><span class="section-pill">Superadmin</span><h2 class="fw-bold mt-3 mb-1">Update User Role</h2></div>
        <a href="{{ url_for('all_users') }}" class="btn btn-light-soft">Back</a>
      </div>
      <div class="soft-card p-3 mb-4">
        <div class="row g-3">
          <div class="col-md-6"><div class="small-muted">Full Name</div><div class="fw-bold">{{ user.full_name }}</div></div>
          <div class="col-md-6"><div class="small-muted">Email</div><div class="fw-bold">{{ user.email }}</div></div>
          <div class="col-md-6"><div class="small-muted">Current Role</div><div class="fw-semibold">{{ user.role }}</div></div>
          <div class="col-md-6"><div class="small-muted">Created At</div><div class="fw-semibold">{{ user.created_at }}</div></div>
        </div>
      </div>
      <form method="POST">
        <div class="mb-4"><label class="form-label fw-semibold">Choose New Role</label><select name="role" class="form-select form-select-lg rounded-4" required><option value="user" {% if user.role == 'user' %}selected{% endif %}>User</option><option value="superadmin" {% if user.role == 'superadmin' %}selected{% endif %}>Super Admin</option></select></div>
        <button type="submit" class="btn btn-primary-soft">Update Role</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
