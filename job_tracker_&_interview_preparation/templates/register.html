{% extends "base.html" %}
{% block title %}Register | CareerForge{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="glass-card p-4 p-md-5">
            <div class="text-center mb-4">
                <span class="section-pill">Create account</span>
                <h2 class="fw-bold mt-3 mb-2">Join CareerForge</h2>
                <p class="small-muted mb-0">Create a superadmin or user account.</p>
            </div>
            <form method="POST" action="{{ url_for('register') }}">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label fw-semibold">Full Name</label>
                        <input type="text" name="full_name" class="form-control form-control-lg rounded-4" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Email Address</label>
                        <input type="email" name="email" class="form-control form-control-lg rounded-4" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Role</label>
                        <select name="role" class="form-select form-select-lg rounded-4" required>
                            <option value="user">User</option>
                            <option value="superadmin">Super Admin</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Password</label>
                        <input type="password" name="password" class="form-control form-control-lg rounded-4" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label fw-semibold">Confirm Password</label>
                        <input type="password" name="confirm_password" class="form-control form-control-lg rounded-4" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary-soft w-100 mt-4">Register</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
